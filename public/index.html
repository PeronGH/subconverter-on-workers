<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>subconverter</title>
		<link rel="stylesheet" href="/pico.min.css" />
	</head>
	<body>
		<main class="container">
			<hgroup>
				<h1>subconverter</h1>
				<p>Build a subscription conversion link. The result points back to this worker's <code>/sub</code> endpoint.</p>
			</hgroup>

			<form id="form">
				<label>
					Subscription URL(s) — one per line
					<textarea id="urls" rows="4" placeholder="https://example.com/sub1&#10;https://example.com/sub2" required></textarea>
				</label>

				<label>
					Target
					<select id="target">
						<option value="clash">Clash</option>
						<option value="clashr">ClashR</option>
						<option value="singbox">sing-box</option>
						<option value="surge">Surge</option>
						<option value="quanx">Quantumult X</option>
						<option value="loon">Loon</option>
						<option value="v2ray">V2Ray</option>
						<option value="ss">SS</option>
						<option value="ssr">SSR</option>
						<option value="trojan">Trojan</option>
						<option value="mixed">Mixed</option>
					</select>
				</label>

				<label>
					External config URL (optional)
					<input id="config" type="text" placeholder="https://example.com/config.ini" />
				</label>

				<fieldset>
					<label><input id="emoji" type="checkbox" checked /> Add emoji</label>
					<label><input id="udp" type="checkbox" /> Enable UDP</label>
				</fieldset>
			</form>

			<article id="output" hidden>
				<output id="result"></output>
				<footer>
					<button id="copy" type="button">Copy link</button>
				</footer>
			</article>
		</main>

		<script>
			const form = document.getElementById('form');
			const output = document.getElementById('output');
			const result = document.getElementById('result');
			const copy = document.getElementById('copy');

			function build() {
				const urls = document
					.getElementById('urls')
					.value.split('\n')
					.map((s) => s.trim())
					.filter(Boolean);
				if (urls.length === 0) {
					output.hidden = true;
					return;
				}

				const target = document.getElementById('target').value;
				const params = new URLSearchParams();
				params.set('target', target);
				params.set('url', urls.join('|'));
				if (target === 'surge') params.set('ver', '4');
				const config = document.getElementById('config').value.trim();
				if (config) params.set('config', config);
				params.set('emoji', document.getElementById('emoji').checked ? 'true' : 'false');
				params.set('udp', document.getElementById('udp').checked ? 'true' : 'false');

				result.textContent = `${location.origin}/sub?${params.toString()}`;
				output.hidden = false;
			}

			form.addEventListener('input', build);
			copy.addEventListener('click', () => navigator.clipboard.writeText(result.textContent));
		</script>
	</body>
</html>
